name: Deploy Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Log In to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Metadata
        id: meta
        run: |
          echo "SHA_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV
          echo "IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/statuspulse" >> $GITHUB_ENV

      - name: Build Docker Image
        run: |
          docker build -t $IMAGE_NAME:latest \
                       -t $IMAGE_NAME:$SHA_TAG .

      - name: Push Docker Images
        run: |
          docker push $IMAGE_NAME:latest
          docker push $IMAGE_NAME:$SHA_TAG

      - name: Verify Image Exists
        run: |
          docker pull $IMAGE_NAME:$SHA_TAG

      - name: Simulated Deployment
        run: |
          echo "Starting deployment..."
          echo "Pulling latest image..."
          echo "Running health checks..."
          echo "Deployment successful!"

      - name: Health Check Verification
        run: |
          echo "Health check passed"

      - name: Simulated Rollback Logic
        if: failure()
        run: |
          echo "Deployment failed"
          echo "Rolling back to previous image..."

      - name: Deployment Notification
        if: always()
        run: |
          echo "Deployment pipeline completed"