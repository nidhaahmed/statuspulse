services:
  app:
    # build: .
    image: ghcr.io/nidhaahmed/statuspulse:latest
    container_name: statuspulse-app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    mem_limit: 512m
    networks:
      - statuspulse-network

  postgres:
    image: postgres:16-alpine
    container_name: statuspulse-postgres
    environment:
      POSTGRES_DB: statuspulse
      POSTGRES_USER: statuspulse
      POSTGRES_PASSWORD: statuspulse123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U statuspulse"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 512m
    networks:
      - statuspulse-network

  redis:
    image: redis:7-alpine
    container_name: statuspulse-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    mem_limit: 256m
    networks:
      - statuspulse-network

  caddy:
    image: caddy:2-alpine
    container_name: statuspulse-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    networks:
      - statuspulse-network

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: statuspulse-uptime-kuma
    ports:
      - "3001:3001"
    volumes:
      - uptime_kuma_data:/app/data
    restart: unless-stopped
    networks:
      - statuspulse-network

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
  uptime_kuma_data:
networks:
  statuspulse-network:
    driver: bridge